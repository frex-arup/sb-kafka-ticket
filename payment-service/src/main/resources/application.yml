server:
  port: 8082
  base-url: ${SERVER_BASE_URL:http://localhost:8082}

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/paymentdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

    consumer:
      group-id: payment-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"

kafka:
  topics:
    ticket-events: ticket-events
    payment-events: payment-events

# Payment simulation settings
payment:
  success-rate: 0.8  # 80% success rate for demonstration

  # Razorpay configuration
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:dummy}
    key-secret: ${RAZORPAY_KEY_SECRET:dummy}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:dummy}
    callback-url: ${RAZORPAY_CALLBACK_URL:http://localhost:8082/api/payments/webhook/razorpay}
    payment-link-expiry-minutes: ${RAZORPAY_LINK_EXPIRY_MINUTES:15}

  # Stripe configuration (simulation mode)
  stripe:
    simulate-failure: true
    payment-link-expiry-minutes: ${STRIPE_LINK_EXPIRY_MINUTES:15}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/paymentdb

  kafka:
    bootstrap-servers: kafka:9092
